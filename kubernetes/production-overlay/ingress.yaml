# ============================================================================
# Akamai Cloud Wazuh Quick-Start - Ingress Configuration
# ============================================================================
# This Ingress resource provides HTTPS access to the Wazuh Dashboard:
#   - Hostname: wazuh.${DOMAIN}
#   - TLS: Let's Encrypt certificate (auto-provisioned)
#   - Backend: wazuh-dashboard service on port 5601
#   - ExternalDNS: Automatic A record creation
#
# Access: https://wazuh.${DOMAIN}
# ============================================================================

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wazuh-dashboard-ingress
  namespace: wazuh
  labels:
    app: wazuh-dashboard
    component: ingress
  annotations:
    # ExternalDNS - Automatic DNS record creation
    external-dns.alpha.kubernetes.io/hostname: "wazuh.${DOMAIN}"
    external-dns.alpha.kubernetes.io/ttl: "300"
    # Force ExternalDNS to update existing records (overwrites stale entries)
    external-dns.alpha.kubernetes.io/force-update: "true"

    # cert-manager - Automatic TLS certificate provisioning.
    # ${CLUSTER_ISSUER} is substituted by deploy.sh (default: letsencrypt-prod).
    # On a bring-your-own-TLS cluster without cert-manager this annotation is
    # simply ignored; provide your own "wazuh-dashboard-tls" secret instead.
    cert-manager.io/cluster-issuer: ${CLUSTER_ISSUER}

    # NGINX Ingress settings
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"

    # Increase proxy timeouts for large dashboard operations
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"

    # Proxy buffer size for Wazuh dashboard
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"

    # Body size limit for file uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

    # Security headers - Note: Additional headers can be configured via
    # nginx ingress controller ConfigMap if snippet directives are disabled
    nginx.ingress.kubernetes.io/enable-cors: "false"

    # Rate limiting (optional, uncomment to enable)
    # nginx.ingress.kubernetes.io/limit-rps: "10"

    # Documentation
    description: "Wazuh Dashboard HTTPS ingress with Let's Encrypt TLS"

spec:
  # ${INGRESS_CLASS} is substituted by deploy.sh (default: nginx). Set
  # INGRESS_CLASS in config.env to match your existing ingress controller.
  ingressClassName: ${INGRESS_CLASS}
  # TLS configuration
  tls:
    - hosts:
        - wazuh.${DOMAIN}
      secretName: wazuh-dashboard-tls

  # Routing rules
  rules:
    - host: wazuh.${DOMAIN}
      http:
        paths:
          # Main dashboard path
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 5601

# NOTE: When cert-manager is installed, its ingress-shim automatically creates
# a Certificate for the host above (from the cert-manager.io/cluster-issuer
# annotation and the tls block) and stores it in the "wazuh-dashboard-tls"
# secret. We deliberately do NOT define an explicit cert-manager Certificate
# resource here so that this manifest also applies cleanly to clusters that do
# not have the cert-manager CRDs installed (bring-your-own-TLS deployments).
